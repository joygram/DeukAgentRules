name: Update npm download badge

on:
  schedule:
    - cron: '17 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Update combined npm download badge
        run: node scripts/update-download-badge.mjs

      - name: Commit badge data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update npm download badge"
          file_pattern: docs/badges/npm-downloads.json
